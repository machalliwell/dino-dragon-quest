<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>DINO-DRAGON QUEST</title>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #000; display: flex; justify-content: center;
           align-items: center; height: 100vh; overflow: hidden; }
    canvas { display: block; image-rendering: pixelated; }
  </style>
</head>
<body>
<canvas id="game" width="800" height="600"></canvas>
<script>
'use strict';

// ================================================================
// CONSTANTS
// ================================================================
const W = 800, H = 600, HALF_H = H / 2;
const FOV = Math.PI / 3, HALF_FOV = FOV / 2;
const TAN_HALF = Math.tan(HALF_FOV);
const MAX_DEPTH = 24;
const TWO_PI = Math.PI * 2;

// ================================================================
// GAME STATE
// ================================================================
const STATE = {
  phase: 'PLAYING',
  level: 1, score: 0, lives: 3,
  frightenTimer:    0,
  playerInvincTimer:0,
  killMessage: '', killMessageTimer: 0,
  deathFlashTimer:  0,
  activePowerUp:    null,  // current active power-up type string
  activePowerUpTimer: 0,   // remaining seconds
  shieldActive:     false, // FOSSIL_SHIELD: absorbs next hit
};

// ================================================================
// CHARACTER DEFINITIONS
// ================================================================
const CHARACTERS = {
  DINO_WARRIOR:  { name: 'DINO WARRIOR',  color: '#44ff44', moveSpeed: 0.060, rotSpeed: 0.038, hitsToKill: 2 },
  DRAGON_KNIGHT: { name: 'DRAGON KNIGHT', color: '#ff4444', moveSpeed: 0.040, rotSpeed: 0.030, hitsToKill: 1 },
  PALEO_PACMAN:  { name: 'PALEO PACMAN',  color: '#ffff44', moveSpeed: 0.050, rotSpeed: 0.034, hitsToKill: 1 },
};
let char = CHARACTERS.PALEO_PACMAN;

// ================================================================
// LEVEL CONFIGS
// ================================================================
const LEVEL_CONFIGS = {
  1: { cols: 8,  rows: 8,  name: 'CRETACEOUS CAVERNS', ghostCount: 3, baseSpeed: 1.0 },
  2: { cols: 11, rows: 11, name: 'MESOZOIC MINES',      ghostCount: 5, baseSpeed: 1.3 },
  3: { cols: 14, rows: 14, name: "DRAGON'S LAIR",       ghostCount: 6, baseSpeed: 1.6 },
};

// ================================================================
// GHOST TYPE DEFINITIONS
// ================================================================
const GHOST_TYPES = {
  SHADOW_RAPTOR: { ai: 'chase',  speedMult: 1.2, color: '#ff6600', killMsg: 'SHADOW RAPTOR SLAIN!' },
  STONE_WYVERN:  { ai: 'patrol', speedMult: 0.9, color: '#6688cc', killMsg: 'WYVERN BANISHED!' },
  BONE_SPECTER:  { ai: 'random', speedMult: 0.7, color: '#dddddd', killMsg: 'SPECTER DISPERSED!' },
};
const GHOST_TYPE_KEYS = ['SHADOW_RAPTOR', 'STONE_WYVERN', 'BONE_SPECTER'];

// ================================================================
// POWER-UP DEFINITIONS
// Each type has a color, inner highlight, abbreviated label, duration,
// and a "bobPhase" offset so they don't all bob in sync.
// ================================================================
const POWER_UP_DEFS = {
  FIRE_BREATH:  { color: '#cc3300', hi: '#ff7700', label: 'FB', duration: 5  },
  TAIL_WHIP:    { color: '#006622', hi: '#00dd44', label: 'TW', duration: 2  }, // stun display only
  FOSSIL_SHIELD:{ color: '#1133aa', hi: '#4488ff', label: 'FS', duration: 999 },
  SPEED_BOOST:  { color: '#886600', hi: '#ffee00', label: 'SB', duration: 8  },
  ANCIENT_RAGE: { color: '#550077', hi: '#cc44ff', label: 'AR', duration: 10 },
};
const PU_TYPES = ['FIRE_BREATH','TAIL_WHIP','FOSSIL_SHIELD','SPEED_BOOST','ANCIENT_RAGE'];

// ================================================================
// MAP DATA  (reassigned by initLevel)
// ================================================================
let map = [], MAP_W = 0, MAP_H = 0;
let pelletGrid = [], pelletsLeft = 0;
let safeRoomSet = new Set();
let ghosts = [], powerUps = [];

// ================================================================
// HELPERS
// ================================================================
const dist2 = (x1,y1,x2,y2)=>{ const dx=x1-x2,dy=y1-y2; return dx*dx+dy*dy; };
const dist  = (x1,y1,x2,y2)=>Math.sqrt(dist2(x1,y1,x2,y2));
function shuffle(arr) {
  for (let i=arr.length-1; i>0; i--) {
    const j=Math.floor(Math.random()*(i+1)); [arr[i],arr[j]]=[arr[j],arr[i]];
  }
  return arr;
}

// ================================================================
// MAZE GENERATOR — recursive backtracker + loop passages
// ================================================================
function generateMaze(cols, rows) {
  const mw=cols*2+1, mh=rows*2+1;
  const grid=Array.from({length:mh},()=>new Array(mw).fill(1));
  const visited=Array.from({length:rows},()=>new Array(cols).fill(false));
  const stack=[[0,0]];
  visited[0][0]=true; grid[1][1]=0;
  const DIRS=[[0,-1],[1,0],[0,1],[-1,0]];
  while(stack.length>0){
    const [cx,cy]=stack[stack.length-1];
    const shuffled=DIRS.slice().sort(()=>Math.random()-0.5);
    let moved=false;
    for(const [dx,dy] of shuffled){
      const nx=cx+dx,ny=cy+dy;
      if(nx>=0&&nx<cols&&ny>=0&&ny<rows&&!visited[ny][nx]){
        grid[cy*2+1+dy][cx*2+1+dx]=0; grid[ny*2+1][nx*2+1]=0;
        visited[ny][nx]=true; stack.push([nx,ny]); moved=true; break;
      }
    }
    if(!moved) stack.pop();
  }
  // Extra loop passages
  for(let y=2;y<mh-2;y++) for(let x=2;x<mw-2;x++){
    if(grid[y][x]!==1||Math.random()>0.12) continue;
    if((grid[y][x-1]===0&&grid[y][x+1]===0)||(grid[y-1][x]===0&&grid[y+1][x]===0))
      grid[y][x]=0;
  }
  return grid;
}

// ================================================================
// LEVEL INITIALISER
// ================================================================
function initLevel(levelNum) {
  const cfg = LEVEL_CONFIGS[levelNum];
  map=generateMaze(cfg.cols,cfg.rows); MAP_W=map[0].length; MAP_H=map.length;

  // Safe rooms
  safeRoomSet=new Set();
  const roomCandidates=[];
  for(let r=0;r<cfg.rows;r++) for(let c=0;c<cfg.cols;c++){
    if(r===0&&c===0) continue;
    const px=c*2+1,py=r*2+1;
    if(map[py][px]===0) roomCandidates.push([px,py]);
  }
  shuffle(roomCandidates);
  for(let i=0;i<2&&i<roomCandidates.length;i++){
    const [sx,sy]=roomCandidates[i]; map[sy][sx]=2; safeRoomSet.add(`${sx},${sy}`);
  }

  // Pellet grid
  pelletGrid=Array.from({length:MAP_H},()=>new Array(MAP_W).fill(0)); pelletsLeft=0;
  const powerCells=[];
  for(let y=1;y<MAP_H-1;y++) for(let x=1;x<MAP_W-1;x++)
    if(map[y][x]===0&&(x>3||y>3)) powerCells.push([x,y]);
  shuffle(powerCells);
  const maxPwr=Math.min(6,Math.floor(powerCells.length*0.04));
  for(let i=0;i<maxPwr;i++){const[x,y]=powerCells[i];pelletGrid[y][x]=2;pelletsLeft++;}
  for(let y=1;y<MAP_H-1;y++) for(let x=1;x<MAP_W-1;x++){
    if(map[y][x]===0&&pelletGrid[y][x]===0){
      if(x<=2&&y<=2) continue; pelletGrid[y][x]=1; pelletsLeft++;
    }
  }

  spawnGhosts(levelNum, cfg);
  spawnPowerUps(levelNum);

  player.x=1.5; player.y=1.5; player.angle=0;
  STATE.frightenTimer=0; STATE.playerInvincTimer=2.0;
  STATE.killMessage=''; STATE.killMessageTimer=0;
  STATE.activePowerUp=null; STATE.activePowerUpTimer=0; STATE.shieldActive=false;
}

function spawnGhosts(levelNum, cfg) {
  ghosts=[];
  const baseSpeed=cfg.baseSpeed;
  const spawnPool=[];
  for(let y=1;y<MAP_H-1;y++) for(let x=1;x<MAP_W-1;x++)
    if(map[y][x]===0&&dist(x+0.5,y+0.5,1.5,1.5)>5) spawnPool.push([x,y]);
  shuffle(spawnPool); let idx=0;
  if(levelNum===3&&idx<spawnPool.length){
    const[cx,cy]=spawnPool[idx++];
    ghosts.push(makeGhost('BOSS',cx,cy,baseSpeed*1.5,'chase',2,'#aa00ff',1.3,true));
  }
  for(let i=0;i<cfg.ghostCount&&idx<spawnPool.length;i++,idx++){
    const tkey=GHOST_TYPE_KEYS[i%3],tdef=GHOST_TYPES[tkey],[cx,cy]=spawnPool[idx];
    ghosts.push(makeGhost(tkey,cx,cy,baseSpeed*tdef.speedMult,tdef.ai,1,tdef.color,1.0,false));
  }
}

function makeGhost(type,cx,cy,speed,ai,hp,color,scale,isBoss){
  return { type,ai,speed,hp,color,scale,isBoss,
    x:cx+0.5,y:cy+0.5, targetCX:cx,targetCY:cy, prevCX:cx,prevCY:cy,
    baseColor:color, dead:false,deadTimer:0,
    spawnX:cx+0.5,spawnY:cy+0.5, hitTimer:0, stunTimer:0 };
}

// Place one of each power-up type per level, spread across the maze
function spawnPowerUps(levelNum) {
  powerUps=[];
  const openCells=[];
  for(let y=1;y<MAP_H-1;y++) for(let x=1;x<MAP_W-1;x++)
    if(map[y][x]===0&&dist(x+0.5,y+0.5,1.5,1.5)>4) openCells.push([x,y]);
  shuffle(openCells);

  // Divide map into quadrants, place one power-up per quadrant if possible
  // Simpler: just take every (N/5)th cell from shuffled list for even distribution
  const step = Math.max(1, Math.floor(openCells.length / 5));
  PU_TYPES.forEach((type, i) => {
    const idx = i * step;
    if(idx < openCells.length) {
      const [cx, cy] = openCells[idx];
      powerUps.push({ x: cx + 0.5, y: cy + 0.5, type, collected: false,
                      bobPhase: i * (Math.PI * 2 / 5) }); // stagger bob cycles
    }
  });
}

// ================================================================
// PLAYER STATE
// ================================================================
const player = { x:1.5, y:1.5, angle:0 };
let prevSpaceDown = false;

// ================================================================
// INPUT
// ================================================================
const keys = {};
window.addEventListener('keydown', e => {
  keys[e.code]=true;
  const gk=['ArrowUp','ArrowDown','ArrowLeft','ArrowRight','KeyW','KeyA','KeyS','KeyD','Space'];
  if(gk.includes(e.code)) e.preventDefault();
});
window.addEventListener('keyup', e => { keys[e.code]=false; });

// ================================================================
// CANVAS + RAYCASTING ENGINE
// ================================================================
const canvas = document.getElementById('game');
const ctx    = canvas.getContext('2d');
const zBuffer = new Float32Array(W);

function castRay(angle) {
  angle=((angle%TWO_PI)+TWO_PI)%TWO_PI;
  const cosA=Math.cos(angle),sinA=Math.sin(angle);
  let mapX=Math.floor(player.x),mapY=Math.floor(player.y);
  const ddx=cosA===0?1e30:Math.abs(1/cosA),ddy=sinA===0?1e30:Math.abs(1/sinA);
  let stepX,stepY,sdx,sdy;
  if(cosA<0){stepX=-1;sdx=(player.x-mapX)*ddx;}else{stepX=1;sdx=(mapX+1-player.x)*ddx;}
  if(sinA<0){stepY=-1;sdy=(player.y-mapY)*ddy;}else{stepY=1;sdy=(mapY+1-player.y)*ddy;}
  let side=0,hit=false;
  for(let i=0;i<MAX_DEPTH*12&&!hit;i++){
    if(sdx<sdy){sdx+=ddx;mapX+=stepX;side=0;}else{sdy+=ddy;mapY+=stepY;side=1;}
    if(mapX<0||mapX>=MAP_W||mapY<0||mapY>=MAP_H) break;
    if(map[mapY][mapX]===1) hit=true;
  }
  if(!hit) return{dist:MAX_DEPTH,side:0};
  let pd;
  if(side===0)pd=(mapX-player.x+(1-stepX)/2)/cosA;
  else        pd=(mapY-player.y+(1-stepY)/2)/sinA;
  return{dist:Math.abs(pd),side};
}

// ================================================================
// WALL PALETTES
// ================================================================
const WALL_PALETTES = {
  1:{bright:[160,90,40], dark:[88,50,22]},
  2:{bright:[80,90,110], dark:[44,50,60]},
  3:{bright:[160,30,30], dark:[88,16,16]},
};

// ================================================================
// SPRITE PROJECTION
// ================================================================
function projectPoint(wx, wy) {
  const dx=wx-player.x,dy=wy-player.y;
  const dirX=Math.cos(player.angle),dirY=Math.sin(player.angle);
  const px=-dirY*TAN_HALF,py=dirX*TAN_HALF;
  const inv=1.0/(px*dirY-dirX*py);
  return{transformX:inv*(dirY*dx-dirX*dy), transformZ:inv*(-py*dx+px*dy)};
}

// ================================================================
// GHOST SPRITE DRAWING  (canvas-drawn colored billboard)
// Body + eye + pupil + 3-bump skirt, column-by-column with ZBuffer test
// ================================================================
function drawGhostSprite(g, tx, tz) {
  const baseH=Math.abs(Math.floor(H/tz));
  const sh=Math.floor(baseH*g.scale),sw=sh;
  const screenX=Math.floor((W/2)*(1+tx/tz));
  const left=screenX-(sw>>1),right=left+sw,top=HALF_H-(sh>>1);
  if(right<0||left>=W||sh<2) return;

  const frightened=STATE.frightenTimer>0;
  const blinking=frightened&&STATE.frightenTimer<3&&Math.floor(pulse*4)%2===0;
  const stunned=g.stunTimer>0;
  const bodyColor= stunned ? '#888800'
                 : frightened ? (blinking ? '#ffffff' : '#0055ff') : g.color;
  const eyeColor=frightened?'#ff3333':'#ffffff';
  const pupilColor=frightened?'#ffffff':'#000033';

  const eyeTop=top+Math.floor(sh*0.20),eyeBot=top+Math.floor(sh*0.42);
  const pupilTop=top+Math.floor(sh*0.28),pupilBot=top+Math.floor(sh*0.40);
  const bodyBot=top+Math.floor(sh*0.80),skirtBot=top+sh,bodyTop=top+Math.floor(sh*0.04);

  for(let sx=Math.max(0,left);sx<Math.min(W,right);sx++){
    if(tz>=zBuffer[sx]) continue;
    const relX=(sx-left)/sw;
    if(relX<0.08||relX>0.92) continue;
    ctx.fillStyle=bodyColor;
    ctx.fillRect(sx,bodyTop,1,bodyBot-bodyTop);
    const inGap=(relX>0.32&&relX<0.38)||(relX>0.62&&relX<0.68);
    if(!inGap) ctx.fillRect(sx,bodyBot,1,skirtBot-bodyBot);
    const inL=relX>=0.14&&relX<=0.38,inR=relX>=0.62&&relX<=0.86;
    if(inL||inR){
      ctx.fillStyle=eyeColor; ctx.fillRect(sx,eyeTop,1,eyeBot-eyeTop);
      if((relX>=0.20&&relX<=0.33)||(relX>=0.67&&relX<=0.80)){
        ctx.fillStyle=pupilColor; ctx.fillRect(sx,pupilTop,1,pupilBot-pupilTop);
      }
    }
  }
  if(g.isBoss&&g.hp<2){
    const by=top+sh+4;
    ctx.fillStyle='#ff4444'; ctx.fillRect(screenX-12,by,24,4);
    ctx.fillStyle='#ff8800'; ctx.fillRect(screenX-12,by,12,4);
  }
}

// ================================================================
// POWER-UP SPRITE DRAWING
// Floating colored square with inner highlight, pulsing bob animation.
// Shows abbreviated label in 2D when close enough to read.
// ================================================================
function drawPowerUpSprite(pu, tx, tz) {
  const def=POWER_UP_DEFS[pu.type];
  const baseH=Math.abs(Math.floor(H/tz))*0.7; // slightly smaller than ghosts
  const sh=Math.max(4,Math.floor(baseH)),sw=sh;
  const screenX=Math.floor((W/2)*(1+tx/tz));

  // Vertical bob: sprite floats up and down sinusoidally
  const bobY=Math.floor(Math.sin(pulse*2.5+pu.bobPhase)*Math.max(2,sh*0.1));
  const top=HALF_H-(sh>>1)+bobY;
  const left=screenX-(sw>>1),right=left+sw;
  if(right<0||left>=W||sh<4) return;

  for(let sx=Math.max(0,left);sx<Math.min(W,right);sx++){
    if(tz>=zBuffer[sx]) continue;
    const relX=(sx-left)/sw;

    // Outer border (10% each side) in highlight color
    if(relX<0.1||relX>0.9){
      ctx.fillStyle=def.hi; ctx.fillRect(sx,top,1,sh); continue;
    }
    // Inner area: background color
    ctx.fillStyle=def.color; ctx.fillRect(sx,top,1,sh);
    // Inner highlight square (60-80% of width, center 50% of height)
    if(relX>0.3&&relX<0.7){
      ctx.fillStyle=def.hi;
      ctx.fillRect(sx, top+Math.floor(sh*0.3), 1, Math.floor(sh*0.4));
    }
  }

  // Show label as 2D text overlay when close enough to be legible
  if(tz < 3.5 && sh > 16) {
    const fontSize=Math.max(7,Math.floor(12/tz));
    ctx.font=`${fontSize}px "Press Start 2P",monospace`;
    ctx.fillStyle='#ffffff'; ctx.textAlign='center';
    ctx.fillText(def.label, screenX, top-3);
  }
}

// ================================================================
// SPRITE RENDERER — pellets, power-ups, and ghosts depth-sorted
// ================================================================
let pulse = 0;

function renderSprites(dt) {
  pulse+=dt;
  const all=[];

  // Pellets
  for(let y=0;y<MAP_H;y++) for(let x=0;x<MAP_W;x++){
    const p=pelletGrid[y][x]; if(!p) continue;
    const{transformX:tx,transformZ:tz}=projectPoint(x+0.5,y+0.5);
    if(tz<0.1||tz>MAX_DEPTH) continue;
    all.push({kind:'p',subtype:p,tx,tz});
  }

  // Power-ups
  for(const pu of powerUps){
    if(pu.collected) continue;
    const{transformX:tx,transformZ:tz}=projectPoint(pu.x,pu.y);
    if(tz<0.1||tz>MAX_DEPTH) continue;
    all.push({kind:'pu',pu,tx,tz});
  }

  // Ghosts
  for(const g of ghosts){
    if(g.dead) continue;
    const{transformX:tx,transformZ:tz}=projectPoint(g.x,g.y);
    if(tz<0.1||tz>MAX_DEPTH) continue;
    all.push({kind:'g',g,tx,tz});
  }

  all.sort((a,b)=>b.tz-a.tz);

  for(const s of all){
    if(s.kind==='g'){ drawGhostSprite(s.g,s.tx,s.tz); continue; }
    if(s.kind==='pu'){ drawPowerUpSprite(s.pu,s.tx,s.tz); continue; }

    // Pellet
    const sh=Math.abs(Math.floor(H/s.tz)),sw=sh;
    const sx0=Math.floor((W/2)*(1+s.tx/s.tz));
    const left=sx0-(sw>>1),right=left+sw;
    if(right<0||left>=W) continue;

    if(s.subtype===1){
      const dh=Math.max(2,Math.floor(sh*0.18)),dy=HALF_H-(dh>>1);
      ctx.fillStyle='#ffe632';
      for(let x=Math.max(0,left);x<Math.min(W,right);x++){
        if(s.tz>=zBuffer[x]) continue;
        const r=(x-left)/sw;
        if(r<0.41||r>0.59) continue;
        ctx.fillRect(x,dy,1,dh);
      }
    } else {
      const scale=0.22+Math.sin(pulse*4)*0.06;
      const dh=Math.max(4,Math.floor(sh*scale)),dy=HALF_H-(dh>>1);
      ctx.fillStyle=`rgba(0,255,200,${(0.75+Math.sin(pulse*4)*0.25).toFixed(2)})`;
      for(let x=Math.max(0,left);x<Math.min(W,right);x++){
        if(s.tz>=zBuffer[x]) continue;
        const r=(x-left)/sw;
        if(r<0.3||r>0.7) continue;
        ctx.fillRect(x,dy,1,dh);
      }
    }
  }
}

// ================================================================
// CHARACTER AVATAR DRAWING  (32×32 canvas icon, no images)
// ================================================================
function drawAvatar(x, y) {
  ctx.fillStyle = '#111'; ctx.fillRect(x, y, 32, 32);
  if (char === CHARACTERS.DINO_WARRIOR) {
    ctx.fillStyle='#22aa33'; ctx.fillRect(x+8,y+12,16,16);  // body
    ctx.fillStyle='#55ee55';                                   // spines
    [[x+9,y+5,4,9],[x+14,y+3,4,11],[x+19,y+5,4,9]].forEach(r=>ctx.fillRect(...r));
    ctx.fillStyle='#fff'; ctx.fillRect(x+10,y+14,4,4);        // eye white
    ctx.fillStyle='#000'; ctx.fillRect(x+11,y+15,2,2);        // pupil
  } else if (char === CHARACTERS.DRAGON_KNIGHT) {
    ctx.fillStyle='#bb1111'; ctx.fillRect(x+9,y+10,14,18);    // body
    ctx.fillStyle='#882222';                                    // wings
    ctx.fillRect(x+1,y+13,9,9); ctx.fillRect(x+22,y+13,9,9);
    ctx.fillStyle='#ffdd00';                                    // crown
    [[x+9,y+4,3,8],[x+14,y+2,4,10],[x+20,y+4,3,8]].forEach(r=>ctx.fillRect(...r));
    ctx.fillStyle='#ff8800'; ctx.fillRect(x+11,y+14,4,3);     // eye
  } else {
    ctx.fillStyle='#ddcc00'; ctx.fillRect(x+5,y+5,22,22);     // body
    ctx.fillStyle='#111'; ctx.fillRect(x+16,y+14,13,8);       // mouth
    ctx.fillStyle='#000'; ctx.fillRect(x+9,y+9,5,5);          // eye
  }
}

// ================================================================
// MINIMAP  (2D overhead view, bottom-right corner)
// Walls: dark gray  |  Safe rooms: pulsing green  |
// Player: white arrow  |  Ghosts: red/blue dots  |  Power-ups: colored dots
// ================================================================
function drawMinimap() {
  const mmW=120, mmH=120;
  const mmX=W-mmW-8, mmY=H-mmH-8;

  // Compute cell size so the whole map fits (minimum 3px per cell)
  const cellW=Math.max(3,Math.floor(mmW/MAP_W));
  const cellH=Math.max(3,Math.floor(mmH/MAP_H));
  const actualW=cellW*MAP_W, actualH=cellH*MAP_H;
  const offX=mmX+Math.floor((mmW-actualW)/2);
  const offY=mmY+Math.floor((mmH-actualH)/2);

  // Panel background + border
  ctx.fillStyle='rgba(0,0,0,0.82)'; ctx.fillRect(mmX,mmY,mmW,mmH);
  ctx.strokeStyle='#555'; ctx.lineWidth=1; ctx.strokeRect(mmX,mmY,mmW,mmH);

  // Map cells
  for(let y=0;y<MAP_H;y++) for(let x=0;x<MAP_W;x++){
    const px=offX+x*cellW, py=offY+y*cellH, cell=map[y][x];
    if(cell===1){
      ctx.fillStyle='#2a2a2a'; ctx.fillRect(px,py,cellW,cellH);
    } else if(cell===2){
      // Safe room: animated green glow
      const g=Math.floor(120+Math.sin(pulse*2)*40);
      ctx.fillStyle=`rgb(0,${g},40)`; ctx.fillRect(px,py,cellW,cellH);
    }
    // Open corridors (0): dark background already covers it
  }

  // Power-ups: small colored squares
  for(const pu of powerUps){
    if(pu.collected) continue;
    const def=POWER_UP_DEFS[pu.type];
    ctx.fillStyle=def.hi;
    ctx.fillRect(offX+Math.floor(pu.x)*cellW, offY+Math.floor(pu.y)*cellH, Math.max(2,cellW-1), Math.max(2,cellH-1));
  }

  // Ghosts: 3×3 dots (blue if frightened)
  for(const g of ghosts){
    if(g.dead) continue;
    ctx.fillStyle=STATE.frightenTimer>0?'#4488ff':'#ff3333';
    const gx=offX+Math.floor(g.x*cellW), gy=offY+Math.floor(g.y*cellH);
    ctx.fillRect(gx-1,gy-1,3,3);
  }

  // Player: white arrow triangle pointing in view direction
  const px=offX+player.x*cellW, py2=offY+player.y*cellH;
  ctx.save();
  ctx.translate(px,py2);
  ctx.rotate(player.angle);
  ctx.fillStyle='#ffffff';
  ctx.beginPath();
  ctx.moveTo(5,0); ctx.lineTo(-3,-3); ctx.lineTo(-1,0); ctx.lineTo(-3,3);
  ctx.closePath(); ctx.fill();
  ctx.restore();
}

// ================================================================
// HUD RENDERER
// Top bar: score / level name / lives+pellets
// Bottom-left: avatar + lives + active power-up + timer bar
// Bottom-right: minimap
// Center: SANCTUARY overlay when player is in a safe room
// ================================================================
function renderHUD() {
  ctx.save();
  ctx.textBaseline='middle';

  // ---- TOP BAR ----
  ctx.fillStyle='rgba(0,0,0,0.78)'; ctx.fillRect(0,0,W,26);

  ctx.font='7px "Press Start 2P",monospace';
  ctx.fillStyle='#ffee44';
  ctx.textAlign='left';
  ctx.fillText(`SCORE ${String(STATE.score).padStart(7,'0')}`, 8, 13);

  ctx.fillStyle='#ffffff';
  ctx.textAlign='center';
  const lvName=LEVEL_CONFIGS[STATE.level]?.name||`LEVEL ${STATE.level}`;
  ctx.fillText(`LV${STATE.level}: ${lvName}`, W/2, 13);

  ctx.textAlign='right';
  // Lives as colored squares (avoid potential missing Unicode glyphs)
  for(let i=0;i<3;i++){
    ctx.fillStyle=i<STATE.lives?'#ff4444':'#444';
    ctx.fillRect(W-8-(2-i)*14, 7, 10, 12);
  }
  ctx.fillStyle='#aaffaa';
  ctx.fillText(`○${pelletsLeft}`, W-52, 13);

  // ---- BOTTOM-LEFT PANEL ----
  const px=8, py=H-86, pw=206, ph=78;
  ctx.fillStyle='rgba(0,0,0,0.78)'; ctx.fillRect(px,py,pw,ph);
  ctx.strokeStyle='#444'; ctx.lineWidth=1; ctx.strokeRect(px,py,pw,ph);

  drawAvatar(px+6, py+6);

  ctx.textAlign='left';
  ctx.font='6px "Press Start 2P",monospace';
  ctx.fillStyle=char.color;
  ctx.fillText(char.name, px+46, py+16);

  // Lives bar (colored square per life)
  ctx.fillStyle='#888'; ctx.fillText('HP', px+46, py+32);
  for(let i=0;i<3;i++){
    ctx.fillStyle=i<STATE.lives?'#ff4444':'#333';
    ctx.fillRect(px+66+i*14, py+26, 10, 12);
  }

  // Invincibility indicator
  if(STATE.playerInvincTimer>0){
    ctx.fillStyle='rgba(255,255,0,0.6)';
    ctx.fillRect(px+46, py+42, Math.floor(pw-52)*STATE.playerInvincTimer/2, 4);
  }

  // Active power-up section
  if(STATE.activePowerUp){
    const def=POWER_UP_DEFS[STATE.activePowerUp];
    if(def){
      // Colored icon square
      ctx.fillStyle=def.color; ctx.fillRect(px+6,py+48,14,14);
      ctx.fillStyle=def.hi;    ctx.fillRect(px+9,py+51,8,8);

      ctx.fillStyle='#fff';
      ctx.font='5px "Press Start 2P",monospace';
      ctx.fillText(STATE.activePowerUp.replace(/_/g,' '), px+26, py+58);

      // Timer bar (skip for FOSSIL_SHIELD — it lasts until hit)
      if(STATE.activePowerUp!=='FOSSIL_SHIELD'){
        const maxD=def.duration;
        const pct=Math.min(1, STATE.activePowerUpTimer/maxD);
        const bw=Math.floor((pw-32)*pct);
        ctx.fillStyle='#333'; ctx.fillRect(px+6,py+68,pw-20,5);
        ctx.fillStyle=def.hi; ctx.fillRect(px+6,py+68,bw,5);
      } else {
        // Shield: pulsing solid bar
        const a=(0.6+Math.sin(pulse*4)*0.4).toFixed(2);
        ctx.fillStyle=`rgba(68,136,255,${a})`;
        ctx.fillRect(px+6,py+68,pw-20,5);
      }
    }
  }

  // Frighten timer bar (shown separately, full-width top sub-bar)
  if(STATE.frightenTimer>0){
    const pct=STATE.frightenTimer/10;
    const bw=Math.floor(W*pct);
    const blinkBar=STATE.frightenTimer<3&&Math.floor(pulse*4)%2===0;
    ctx.fillStyle=blinkBar?'#ffffff':'#0055ff';
    ctx.fillRect(0,26,bw,4);
  }

  drawMinimap();

  // ---- SANCTUARY OVERLAY ----
  const cx=Math.floor(player.x), cy2=Math.floor(player.y);
  if(safeRoomSet.has(`${cx},${cy2}`)){
    const alpha=(0.55+Math.sin(pulse*3)*0.35).toFixed(2);
    ctx.font='14px "Press Start 2P",monospace';
    ctx.fillStyle=`rgba(0,255,100,${alpha})`;
    ctx.textAlign='center';
    ctx.fillText('** SANCTUARY **', W/2, H/2+28);
  }

  ctx.restore();
}

// ================================================================
// RENDER 3D SCENE
// ================================================================
function renderScene(dt) {
  const pal=WALL_PALETTES[STATE.level]||WALL_PALETTES[1];
  ctx.fillStyle='#0d0d1a'; ctx.fillRect(0,0,W,HALF_H);
  ctx.fillStyle='#1a0e06'; ctx.fillRect(0,HALF_H,W,HALF_H);
  for(let x=0;x<W;x++){
    const{dist:d,side}=castRay(player.angle-HALF_FOV+(x/W)*FOV);
    zBuffer[x]=d;
    const wh=Math.min(H,Math.floor(H/d));
    const fog=Math.min(1,d/MAX_DEPTH);
    const sh=(side===1?0.55:1.0)*(1-fog*0.75);
    const[pr,pg,pb]=pal.bright;
    ctx.fillStyle=`rgb(${Math.floor(pr*sh)},${Math.floor(pg*sh)},${Math.floor(pb*sh)})`;
    ctx.fillRect(x,HALF_H-(wh>>1),1,wh);
  }
  renderSprites(dt);

  // Overlays
  if(STATE.deathFlashTimer>0){
    ctx.fillStyle=`rgba(220,0,0,${(STATE.deathFlashTimer/0.4).toFixed(2)})`;
    ctx.fillRect(0,0,W,H);
  }
  // Shield flash (blue tint while active)
  if(STATE.shieldActive&&Math.floor(pulse*4)%6===0){
    ctx.fillStyle='rgba(0,80,220,0.12)'; ctx.fillRect(0,0,W,H);
  }
  if(STATE.killMessageTimer>0){
    ctx.font='12px "Press Start 2P",monospace';
    ctx.fillStyle='#ffff00'; ctx.textAlign='center';
    ctx.fillText(STATE.killMessage,W/2,H/2-40);
  }

  renderHUD();
}

// ================================================================
// WALKABILITY
// ================================================================
function isWalkable(mx,my){
  if(mx<0||mx>=MAP_W||my<0||my>=MAP_H) return false;
  return map[my][mx]!==1;
}
function isGhostWalkable(mx,my){
  if(mx<0||mx>=MAP_W||my<0||my>=MAP_H) return false;
  return map[my][mx]===0;
}

// ================================================================
// GHOST AI — cell-to-cell movement, no U-turns
// ================================================================
function pickNextCell(g){
  const cx=Math.floor(g.x),cy=Math.floor(g.y);
  const DIRS=[[-1,0],[1,0],[0,-1],[0,1]];
  const avoidPrev=DIRS.filter(([dx,dy])=>{
    const nx=cx+dx,ny=cy+dy;
    return isGhostWalkable(nx,ny)&&!(nx===g.prevCX&&ny===g.prevCY);
  });
  const options=avoidPrev.length>0?avoidPrev:DIRS.filter(([dx,dy])=>isGhostWalkable(cx+dx,cy+dy));
  if(options.length===0) return;
  let chosen;
  const fright=STATE.frightenTimer>0;
  if(fright){
    chosen=options.reduce((b,d)=>{
      const db=dist2(cx+b[0]+0.5,cy+b[1]+0.5,player.x,player.y);
      const dd=dist2(cx+d[0]+0.5,cy+d[1]+0.5,player.x,player.y);
      return dd>db?d:b;
    });
  } else if((g.ai==='chase'||g.isBoss)&&Math.random()<0.75){
    chosen=options.reduce((b,d)=>{
      const db=dist2(cx+b[0]+0.5,cy+b[1]+0.5,player.x,player.y);
      const dd=dist2(cx+d[0]+0.5,cy+d[1]+0.5,player.x,player.y);
      return dd<db?d:b;
    });
  } else {
    chosen=options[Math.floor(Math.random()*options.length)];
  }
  g.prevCX=cx; g.prevCY=cy;
  g.targetCX=cx+chosen[0]; g.targetCY=cy+chosen[1];
}

function updateGhosts(dt){
  if(STATE.frightenTimer>0) STATE.frightenTimer-=dt;
  for(const g of ghosts){
    if(g.dead){g.deadTimer-=dt;if(g.deadTimer<=0)respawnGhost(g);continue;}
    if(g.hitTimer>0) g.hitTimer-=dt;
    if(g.stunTimer>0){ g.stunTimer-=dt; continue; } // stunned ghosts don't move
    const speed=STATE.frightenTimer>0?g.speed*0.5:g.speed;
    const tx=g.targetCX+0.5,ty=g.targetCY+0.5;
    const dx=tx-g.x,dy=ty-g.y,d=Math.sqrt(dx*dx+dy*dy);
    if(d<speed*dt+0.06){g.x=tx;g.y=ty;pickNextCell(g);}
    else{g.x+=(dx/d)*speed*dt;g.y+=(dy/d)*speed*dt;}
    if(STATE.playerInvincTimer>0) continue;
    if(dist(g.x,g.y,player.x,player.y)<0.55&&STATE.frightenTimer<=0) playerHit();
  }
}

function respawnGhost(g){
  g.x=g.spawnX;g.y=g.spawnY;g.targetCX=Math.floor(g.spawnX);g.targetCY=Math.floor(g.spawnY);
  g.prevCX=g.targetCX;g.prevCY=g.targetCY;g.hp=g.isBoss?2:1;g.color=g.baseColor;
  g.dead=false;g.hitTimer=0;g.stunTimer=0;
}

function playerHit(){
  if(STATE.shieldActive){
    // Shield absorbs the hit
    STATE.shieldActive=false; STATE.activePowerUp=null; STATE.activePowerUpTimer=0;
    STATE.deathFlashTimer=0.2; // small flash to confirm shield used
    return;
  }
  STATE.lives--; STATE.playerInvincTimer=2.0; STATE.deathFlashTimer=0.4;
  if(STATE.lives<=0) STATE.phase='GAME_OVER';
}

// ================================================================
// POWER-UP COLLECTION + EFFECTS
// ================================================================
function collectPowerUp(pu){
  pu.collected=true;
  switch(pu.type){
    case 'FIRE_BREATH':
      STATE.activePowerUp='FIRE_BREATH';
      STATE.activePowerUpTimer=POWER_UP_DEFS.FIRE_BREATH.duration;
      break;
    case 'TAIL_WHIP':
      // Instant AOE stun — freeze all ghosts within 2 units for 2s
      for(const g of ghosts) if(!g.dead&&dist(g.x,g.y,player.x,player.y)<2) g.stunTimer=2;
      STATE.activePowerUp='TAIL_WHIP';
      STATE.activePowerUpTimer=2;
      break;
    case 'FOSSIL_SHIELD':
      STATE.shieldActive=true;
      STATE.activePowerUp='FOSSIL_SHIELD';
      STATE.activePowerUpTimer=999;
      break;
    case 'SPEED_BOOST':
      STATE.activePowerUp='SPEED_BOOST';
      STATE.activePowerUpTimer=POWER_UP_DEFS.SPEED_BOOST.duration;
      break;
    case 'ANCIENT_RAGE':
      STATE.frightenTimer=10;
      STATE.activePowerUp='ANCIENT_RAGE';
      STATE.activePowerUpTimer=10;
      break;
  }
}

// ================================================================
// PLAYER ATTACK  (Space key — rising edge)
// Normal mode: attacks nearest frightened ghost within melee range.
// FIRE_BREATH active: kills any ghost within extended range (no frighten required).
// ================================================================
function handleAttack(){
  if(STATE.activePowerUp==='FIRE_BREATH'){
    // Ranged kill — works on any ghost, no frighten required
    const range=5;
    let closest=null,closestD=range;
    for(const g of ghosts){
      if(g.dead) continue;
      const d=dist(g.x,g.y,player.x,player.y);
      if(d<closestD){closestD=d;closest=g;}
    }
    if(!closest) return;
    const ghDef=GHOST_TYPES[closest.type];
    STATE.score+=closest.isBoss?500:100;
    STATE.killMessage=closest.isBoss?'BOSS SCORCHED!':ghDef?`${ghDef.killMsg.replace('!','')} (FIRE)!`:'GHOST INCINERATED!';
    STATE.killMessageTimer=2;
    closest.dead=true; closest.deadTimer=5;
    return;
  }

  // Normal attack: must be frightened
  if(STATE.frightenTimer<=0) return;
  const range=char.hitsToKill===1?1.5:1.2;
  let closest=null,closestD=range;
  for(const g of ghosts){
    if(g.dead) continue;
    const d=dist(g.x,g.y,player.x,player.y);
    if(d<closestD){closestD=d;closest=g;}
  }
  if(!closest) return;
  closest.hp--;
  if(closest.hp<=0){
    const ghDef=GHOST_TYPES[closest.type];
    STATE.score+=closest.isBoss?1000:200;
    STATE.killMessage=closest.isBoss?'DRAGON SPECTER VANQUISHED!':ghDef?ghDef.killMsg:'GHOST SLAIN!';
    STATE.killMessageTimer=2; closest.dead=true; closest.deadTimer=5;
  } else {
    closest.color='#ff00cc';
    STATE.score+=50; STATE.killMessage='BOSS STAGGERED!'; STATE.killMessageTimer=1.5;
    closest.hitTimer=0.3;
  }
}

// ================================================================
// PLAYER UPDATE
// ================================================================
function updatePlayer(dt){
  const{moveSpeed,rotSpeed}=char;
  // SPEED_BOOST doubles movement speed while active
  const spdMult=STATE.activePowerUp==='SPEED_BOOST'?1.5:1.0;

  if(keys['ArrowLeft']||keys['KeyA']) player.angle-=rotSpeed;
  if(keys['ArrowRight']||keys['KeyD']) player.angle+=rotSpeed;
  let dx=0,dy=0;
  if(keys['ArrowUp']||keys['KeyW']){dx=Math.cos(player.angle)*moveSpeed*spdMult;dy=Math.sin(player.angle)*moveSpeed*spdMult;}
  if(keys['ArrowDown']||keys['KeyS']){dx=-Math.cos(player.angle)*moveSpeed*spdMult;dy=-Math.sin(player.angle)*moveSpeed*spdMult;}
  const M=0.25;
  if(dx!==0){const nx=player.x+dx;if(isWalkable(Math.floor(nx+Math.sign(dx)*M),Math.floor(player.y)))player.x=nx;}
  if(dy!==0){const ny=player.y+dy;if(isWalkable(Math.floor(player.x),Math.floor(ny+Math.sign(dy)*M)))player.y=ny;}

  // Pellet collection
  const cx=Math.floor(player.x),cy=Math.floor(player.y);
  if(pelletGrid[cy]&&pelletGrid[cy][cx]>0){
    const ptype=pelletGrid[cy][cx]; pelletGrid[cy][cx]=0; pelletsLeft--;
    if(ptype===1) STATE.score+=10;
    else{STATE.score+=50;STATE.frightenTimer=10;}
  }

  // Power-up collection
  for(const pu of powerUps){
    if(pu.collected) continue;
    if(dist(pu.x,pu.y,player.x,player.y)<0.55) collectPowerUp(pu);
  }

  // Space attack
  const spaceNow=!!keys['Space'];
  if(spaceNow&&!prevSpaceDown) handleAttack();
  prevSpaceDown=spaceNow;

  // Countdown timers
  if(STATE.playerInvincTimer>0) STATE.playerInvincTimer-=dt;
  if(STATE.killMessageTimer>0)  STATE.killMessageTimer-=dt;
  if(STATE.deathFlashTimer>0)   STATE.deathFlashTimer-=dt;

  // Active power-up timer decay
  if(STATE.activePowerUp&&STATE.activePowerUp!=='FOSSIL_SHIELD'){
    STATE.activePowerUpTimer-=dt;
    if(STATE.activePowerUpTimer<=0){
      STATE.activePowerUp=null; STATE.activePowerUpTimer=0;
    }
  }
  // Keep ANCIENT_RAGE timer in sync with frightenTimer
  if(STATE.activePowerUp==='ANCIENT_RAGE') STATE.activePowerUpTimer=STATE.frightenTimer;

  if(pelletsLeft<=0) STATE.phase='LEVEL_COMPLETE';
}

// ================================================================
// GAME LOOP
// ================================================================
let lastTime = 0;
function loop(ts){
  const dt=Math.min((ts-lastTime)/1000,0.05); lastTime=ts;
  if(STATE.phase==='PLAYING'){
    updatePlayer(dt); updateGhosts(dt); renderScene(dt);
  } else {
    ctx.fillStyle='#000'; ctx.fillRect(0,0,W,H);
    ctx.font='14px "Press Start 2P",monospace';
    ctx.fillStyle='#fff'; ctx.textAlign='center';
    if(STATE.phase==='GAME_OVER')      ctx.fillText('GAME OVER',W/2,H/2);
    if(STATE.phase==='LEVEL_COMPLETE') ctx.fillText('LEVEL COMPLETE',W/2,H/2);
  }
  requestAnimationFrame(loop);
}

// ================================================================
// BOOT
// ================================================================
initLevel(STATE.level);
requestAnimationFrame(loop);
</script>
