<script>
'use strict';

// ================================================================
// CONSTANTS
// ================================================================
const W = 800, H = 600, HALF_H = H / 2;
const FOV = Math.PI / 3, HALF_FOV = FOV / 2;
const TAN_HALF = Math.tan(HALF_FOV);
const MAX_DEPTH = 24;
const TWO_PI = Math.PI * 2;
const CHAR_KEYS = ['DINO_WARRIOR', 'DRAGON_KNIGHT', 'PALEO_PACMAN'];
const AGE_KEYS  = ['young','mid','old'];

// Difficulty parameters per age group — drives maze size, ghost speed, safe room count, power-up durations
const DIFF_PARAMS = {
  young: { ghostSpeedMult:0.60, safeRooms:3, ghostCounts:[2,3,4],
           mazeSizes:[{cols:6,rows:6},{cols:8,rows:8},{cols:10,rows:10}],
           powerUpMult:1.5, frightenDuration:12 },
  mid:   { ghostSpeedMult:1.00, safeRooms:2, ghostCounts:[3,5,6],
           mazeSizes:[{cols:8,rows:8},{cols:11,rows:11},{cols:14,rows:14}],
           powerUpMult:1.0, frightenDuration:10 },
  old:   { ghostSpeedMult:1.40, safeRooms:1, ghostCounts:[4,6,7],
           mazeSizes:[{cols:10,rows:10},{cols:13,rows:13},{cols:16,rows:16}],
           powerUpMult:0.7, frightenDuration:7  },
};

// ================================================================
// PERSISTENCE — high score stored in localStorage
// ================================================================
let highScore = parseInt(localStorage.getItem('dino-dragon-hs') || '0');
function updateHighScore() {
  if (STATE.score > highScore) {
    highScore = STATE.score;
    localStorage.setItem('dino-dragon-hs', highScore);
  }
}

  phase: 'AGE_SELECT',       // start on age select screen
  ageGroup: 'mid',           // 'young' | 'mid' | 'old' — set on age select, persists all session
  selectedAge: 1,            // cursor index (0=young, 1=mid, 2=old)
  selectedChar: 0,           // index into CHAR_KEYS for title selection

  playerInvincTimer: 0,
  killMessage: '', killMessageTimer: 0,
  deathFlashTimer: 0,
  activePowerUp: null,
  activePowerUpTimer: 0,

                   desc: 'FAST SPEED\nWEAK ATTACK' },
  DRAGON_KNIGHT: { name: 'DRAGON KNIGHT', color: '#ff4444', moveSpeed: 0.040, rotSpeed: 0.030, hitsToKill: 1,

  PALEO_PACMAN:  { name: 'PALEO PACMAN',  color: '#ffff44', moveSpeed: 0.050, rotSpeed: 0.034, hitsToKill: 1,
                   desc: 'BALANCED\nALL STATS' },
};
let char = CHARACTERS.PALEO_PACMAN;

// LEVEL CONFIGS
// ================================================================
const LEVEL_CONFIGS = {
  1: { cols: 8,  rows: 8,  name: 'CRETACEOUS CAVERNS', ghostCount: 3, baseSpeed: 1.0 },
  2: { cols: 11, rows: 11, name: 'MESOZOIC MINES',      ghostCount: 5, baseSpeed: 1.3 },
  3: { cols: 14, rows: 14, name: "DRAGON'S LAIR",       ghostCount: 6, baseSpeed: 1.6 },
};

// ================================================================
// GHOST TYPE DEFINITIONS
// ================================================================
const GHOST_TYPES = {
  SHADOW_RAPTOR: { ai: 'chase',  speedMult: 1.2, color: '#ff6600', killMsg: 'SHADOW RAPTOR SLAIN!' },
  STONE_WYVERN:  { ai: 'patrol', speedMult: 0.9, color: '#6688cc', killMsg: 'WYVERN BANISHED!' },
  BONE_SPECTER:  { ai: 'random', speedMult: 0.7, color: '#dddddd', killMsg: 'SPECTER DISPERSED!' },
};
const GHOST_TYPE_KEYS = ['SHADOW_RAPTOR', 'STONE_WYVERN', 'BONE_SPECTER'];

// ================================================================
// POWER-UP DEFINITIONS
// ================================================================
const POWER_UP_DEFS = {
  FIRE_BREATH:  { color: '#cc3300', hi: '#ff7700', label: 'FB', duration: 5   },
  TAIL_WHIP:    { color: '#006622', hi: '#00dd44', label: 'TW', duration: 2   },
  FOSSIL_SHIELD:{ color: '#1133aa', hi: '#4488ff', label: 'FS', duration: 999 },
  SPEED_BOOST:  { color: '#886600', hi: '#ffee00', label: 'SB', duration: 8   },
  ANCIENT_RAGE: { color: '#550077', hi: '#cc44ff', label: 'AR', duration: 10  },
};
const PU_TYPES = ['FIRE_BREATH','TAIL_WHIP','FOSSIL_SHIELD','SPEED_BOOST','ANCIENT_RAGE'];

// ================================================================
// MAP DATA
// ================================================================
let map = [], MAP_W = 0, MAP_H = 0;
let pelletGrid = [], pelletsLeft = 0;
let safeRoomSet = new Set();
let ghosts = [], powerUps = [];

// ================================================================
// HELPERS
// ================================================================
const dist2 = (x1,y1,x2,y2)=>{ const dx=x1-x2,dy=y1-y2; return dx*dx+dy*dy; };
const dist  = (x1,y1,x2,y2)=>Math.sqrt(dist2(x1,y1,x2,y2));
function shuffle(arr){
  for(let i=arr.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[arr[i],arr[j]]=[arr[j],arr[i]];}
  return arr;
}

// ================================================================
// AUDIO SYSTEM — Web Audio API, synthesized, no external files
// AudioContext created lazily on first user interaction (browser policy).
// ================================================================
let _ac = null;
function getAC() {
  if (!_ac) _ac = new (window.AudioContext || window.webkitAudioContext)();
  if (_ac.state === 'suspended') _ac.resume();
  return _ac;
}

/**
 * Play a synthesized tone.
 * freq: Hz (start), freqEnd: Hz (glide end, null = no glide)
 * type: OscillatorType string, dur: seconds, vol: 0-1
 */
function tone(freq, type, dur, vol=0.25, freqEnd=null) {
  try {
    const a = getAC();
    const osc = a.createOscillator();
    const gain = a.createGain();
    osc.connect(gain); gain.connect(a.destination);
    osc.type = type;
    const t = a.currentTime;
    osc.frequency.setValueAtTime(freq, t);
    if (freqEnd !== null) osc.frequency.exponentialRampToValueAtTime(Math.max(1,freqEnd), t+dur);
    gain.gain.setValueAtTime(vol, t);
    gain.gain.exponentialRampToValueAtTime(0.001, t+dur);
    osc.start(t); osc.stop(t+dur);
  } catch(e) {}
}

/** Named sound effects */
function playSound(name) {
  switch(name) {
    case 'footstep':   tone(70, 'square', 0.04, 0.07); break;
    case 'pellet':     tone(880, 'sine', 0.07, 0.12, 1200); break;
    case 'pelletPwr':  tone(440, 'sine', 0.18, 0.28, 880);
                       setTimeout(()=>tone(1100,'sine',0.12,0.18), 150); break;
    case 'powerup':
      tone(440,'sine',0.10,0.22);
      setTimeout(()=>tone(660,'sine',0.10,0.22),110);
      setTimeout(()=>tone(880,'sine',0.15,0.28),220); break;
    case 'frighten':   tone(800,'sawtooth',0.5,0.2,200); break;
    case 'ghostDefeat':tone(220,'sawtooth',0.08,0.3,600);
                       setTimeout(()=>tone(900,'sine',0.12,0.25), 80); break;
    case 'death':      tone(440,'sawtooth',0.9,0.35,55); break;
    case 'levelDone':
      [0,140,280,440].forEach((d,i)=>setTimeout(()=>tone([330,392,523,659][i],'square',0.14,0.22),d)); break;
    case 'titleBeep':  tone(660,'square',0.06,0.14); break;
    case 'shieldHit':  tone(300,'square',0.10,0.22,800); break;
    case 'win':
      [0,120,240,380,540].forEach((d,i)=>setTimeout(()=>tone([330,440,523,659,880][i],'sine',0.2,0.28),d)); break;
  }
}

// ================================================================
// MAZE GENERATOR — recursive backtracker + loop passages
// ================================================================
function generateMaze(cols, rows) {
  const mw=cols*2+1,mh=rows*2+1;
  const grid=Array.from({length:mh},()=>new Array(mw).fill(1));
  const visited=Array.from({length:rows},()=>new Array(cols).fill(false));
  const stack=[[0,0]]; visited[0][0]=true; grid[1][1]=0;
  const DIRS=[[0,-1],[1,0],[0,1],[-1,0]];
  while(stack.length>0){
    const [cx,cy]=stack[stack.length-1];
    const sh=DIRS.slice().sort(()=>Math.random()-0.5);
    let moved=false;
    for(const [dx,dy] of sh){
      const nx=cx+dx,ny=cy+dy;
      if(nx>=0&&nx<cols&&ny>=0&&ny<rows&&!visited[ny][nx]){
        grid[cy*2+1+dy][cx*2+1+dx]=0; grid[ny*2+1][nx*2+1]=0;
        visited[ny][nx]=true; stack.push([nx,ny]); moved=true; break;
      }
    }
    if(!moved) stack.pop();
  }
  for(let y=2;y<mh-2;y++) for(let x=2;x<mw-2;x++){
    if(grid[y][x]!==1||Math.random()>0.12) continue;
    if((grid[y][x-1]===0&&grid[y][x+1]===0)||(grid[y-1][x]===0&&grid[y+1][x]===0)) grid[y][x]=0;
  }
  return grid;
}

// ================================================================
// LEVEL INITIALISER
// ================================================================
function initLevel(levelNum) {
  const diff=DIFF_PARAMS[STATE.ageGroup];
  const ms=diff.mazeSizes[levelNum-1];         // maze dimensions scaled to age group
  map=generateMaze(ms.cols,ms.rows); MAP_W=map[0].length; MAP_H=map.length;

  safeRoomSet=new Set();
  const rc=[];
  for(let r=0;r<ms.rows;r++) for(let c=0;c<ms.cols;c++){
    if(r===0&&c===0) continue;
    const px=c*2+1,py=r*2+1;
    if(map[py][px]===0) rc.push([px,py]);
  }
  shuffle(rc);
  // safe room count from diff params (young=3, mid=2, old=1)
  for(let i=0;i<diff.safeRooms&&i<rc.length;i++){const [sx,sy]=rc[i];map[sy][sx]=2;safeRoomSet.add(`${sx},${sy}`);}

  pelletGrid=Array.from({length:MAP_H},()=>new Array(MAP_W).fill(0)); pelletsLeft=0;
  const pc=[];
  for(let y=1;y<MAP_H-1;y++) for(let x=1;x<MAP_W-1;x++)
    if(map[y][x]===0&&(x>3||y>3)) pc.push([x,y]);
  shuffle(pc);
  const maxP=Math.min(6,Math.floor(pc.length*0.04));
  for(let i=0;i<maxP;i++){const [x,y]=pc[i];pelletGrid[y][x]=2;pelletsLeft++;}
  for(let y=1;y<MAP_H-1;y++) for(let x=1;x<MAP_W-1;x++){
    if(map[y][x]===0&&pelletGrid[y][x]===0){if(x<=2&&y<=2)continue;pelletGrid[y][x]=1;pelletsLeft++;}
  }

  spawnGhosts(levelNum,diff);
  spawnPowerUps();

  player.x=1.5; player.y=1.5; player.angle=0;
  STATE.frightenTimer=0; STATE.playerInvincTimer=2.0;
  STATE.killMessage=''; STATE.killMessageTimer=0;
  STATE.activePowerUp=null; STATE.activePowerUpTimer=0; STATE.shieldActive=false;
}

function spawnGhosts(levelNum,diff){
  ghosts=[];
  const cfg=LEVEL_CONFIGS[levelNum];
  const base=cfg.baseSpeed*diff.ghostSpeedMult;  // age-group speed multiplier applied here
  const gc=diff.ghostCounts[levelNum-1];          // ghost count from diff params
  const sp=[];
  for(let y=1;y<MAP_H-1;y++) for(let x=1;x<MAP_W-1;x++)
    if(map[y][x]===0&&dist(x+0.5,y+0.5,1.5,1.5)>5) sp.push([x,y]);
  shuffle(sp); let idx=0;
  if(levelNum===3&&idx<sp.length){
    const [cx,cy]=sp[idx++];
    ghosts.push(makeGhost('BOSS',cx,cy,base*1.5,'chase',2,'#aa00ff',1.3,true));
  }
  for(let i=0;i<gc&&idx<sp.length;i++,idx++){
    const tk=GHOST_TYPE_KEYS[i%3],td=GHOST_TYPES[tk],[cx,cy]=sp[idx];
    ghosts.push(makeGhost(tk,cx,cy,base*td.speedMult,td.ai,1,td.color,1.0,false));
  }
}

function makeGhost(type,cx,cy,speed,ai,hp,color,scale,isBoss){
  return{type,ai,speed,hp,color,scale,isBoss,
    x:cx+0.5,y:cy+0.5,targetCX:cx,targetCY:cy,prevCX:cx,prevCY:cy,
    baseColor:color,dead:false,deadTimer:0,spawnX:cx+0.5,spawnY:cy+0.5,hitTimer:0,stunTimer:0};
}

function spawnPowerUps(){
  powerUps=[];
  const oc=[];
  for(let y=1;y<MAP_H-1;y++) for(let x=1;x<MAP_W-1;x++)
    if(map[y][x]===0&&dist(x+0.5,y+0.5,1.5,1.5)>4) oc.push([x,y]);
  shuffle(oc);
  const step=Math.max(1,Math.floor(oc.length/5));
  PU_TYPES.forEach((type,i)=>{
    const idx=i*step;
    if(idx<oc.length){
      const [cx,cy]=oc[idx];
      powerUps.push({x:cx+0.5,y:cy+0.5,type,collected:false,bobPhase:i*(TWO_PI/5)});
    }
  });
}

// ================================================================
// PLAYER STATE
// ================================================================
const player={x:1.5,y:1.5,angle:0};
let prevSpaceDown=false, footstepTimer=0, enterPressed=false;
let titleLeftPrev=false, titleRightPrev=false;
let ageLeftPrev=false,   ageRightPrev=false;

// ================================================================
// INPUT
// ================================================================
const keys={};
window.addEventListener('keydown',e=>{
  getAC(); // unlock AudioContext on first key press
  keys[e.code]=true;
  if(e.code==='Enter'||e.code==='NumpadEnter'){enterPressed=true;e.preventDefault();}
  const gk=['ArrowUp','ArrowDown','ArrowLeft','ArrowRight','KeyW','KeyA','KeyS','KeyD','Space'];
  if(gk.includes(e.code)) e.preventDefault();
});
window.addEventListener('keyup',e=>{keys[e.code]=false;});

// ================================================================
// CANVAS + RAYCASTING ENGINE — DDA
// ================================================================
const canvas=document.getElementById('game');
const ctx=canvas.getContext('2d');
const zBuffer=new Float32Array(W);

function castRay(angle){
  angle=((angle%TWO_PI)+TWO_PI)%TWO_PI;
  const cosA=Math.cos(angle),sinA=Math.sin(angle);
  let mx=Math.floor(player.x),my=Math.floor(player.y);
  const ddx=cosA===0?1e30:Math.abs(1/cosA),ddy=sinA===0?1e30:Math.abs(1/sinA);
  let sx,sy,sdx,sdy;
  if(cosA<0){sx=-1;sdx=(player.x-mx)*ddx;}else{sx=1;sdx=(mx+1-player.x)*ddx;}
  if(sinA<0){sy=-1;sdy=(player.y-my)*ddy;}else{sy=1;sdy=(my+1-player.y)*ddy;}
  let side=0,hit=false;
  for(let i=0;i<MAX_DEPTH*12&&!hit;i++){
    if(sdx<sdy){sdx+=ddx;mx+=sx;side=0;}else{sdy+=ddy;my+=sy;side=1;}
    if(mx<0||mx>=MAP_W||my<0||my>=MAP_H) break;
    if(map[my][mx]===1) hit=true;
  }
  if(!hit) return{dist:MAX_DEPTH,side:0};
  let pd;
  if(side===0)pd=(mx-player.x+(1-sx)/2)/cosA;
  else        pd=(my-player.y+(1-sy)/2)/sinA;
  return{dist:Math.abs(pd),side};
}

// ================================================================
// WALL PALETTES
// ================================================================
const WALL_PALETTES={
  1:{bright:[160,90,40],dark:[88,50,22]},
  2:{bright:[80,90,110],dark:[44,50,60]},
  3:{bright:[160,30,30],dark:[88,16,16]},
};

// ================================================================
// SPRITE PROJECTION
// ================================================================
function projectPoint(wx,wy){
  const dx=wx-player.x,dy=wy-player.y;
  const dirX=Math.cos(player.angle),dirY=Math.sin(player.angle);
  const px=-dirY*TAN_HALF,py=dirX*TAN_HALF;
  const inv=1.0/(px*dirY-dirX*py);
  return{transformX:inv*(dirY*dx-dirX*dy),transformZ:inv*(-py*dx+px*dy)};
}

// ================================================================
// CHARACTER AVATAR DRAWING
// charObj: one of the CHARACTERS values.  sz: size in pixels (default 32).
// All coordinates are scaled by sz/32 relative to the 32×32 reference layout.
// ================================================================
function drawAvatar(charObj, x, y, sz=32){
  const r=sz/32;
  const f=(v)=>Math.floor(v*r);
  ctx.fillStyle='#111'; ctx.fillRect(x,y,sz,sz);
  if(charObj===CHARACTERS.DINO_WARRIOR){
    ctx.fillStyle='#22aa33'; ctx.fillRect(x+f(8),y+f(12),f(16),f(16));
    ctx.fillStyle='#55ee55';
    [[9,5,4,9],[14,3,4,11],[19,5,4,9]].forEach(([rx,ry,rw,rh])=>
      ctx.fillRect(x+f(rx),y+f(ry),Math.max(1,f(rw)),Math.max(1,f(rh))));
    ctx.fillStyle='#fff'; ctx.fillRect(x+f(10),y+f(14),Math.max(2,f(4)),Math.max(2,f(4)));
    ctx.fillStyle='#000'; ctx.fillRect(x+f(11),y+f(15),Math.max(1,f(2)),Math.max(1,f(2)));
  } else if(charObj===CHARACTERS.DRAGON_KNIGHT){
    ctx.fillStyle='#bb1111'; ctx.fillRect(x+f(9),y+f(10),f(14),f(18));
    ctx.fillStyle='#882222';
    ctx.fillRect(x+f(1),y+f(13),f(9),f(9)); ctx.fillRect(x+f(22),y+f(13),f(9),f(9));
    ctx.fillStyle='#ffdd00';
    [[9,4,3,8],[14,2,4,10],[20,4,3,8]].forEach(([rx,ry,rw,rh])=>
      ctx.fillRect(x+f(rx),y+f(ry),Math.max(1,f(rw)),Math.max(1,f(rh))));
    ctx.fillStyle='#ff8800'; ctx.fillRect(x+f(11),y+f(14),Math.max(2,f(4)),Math.max(1,f(3)));
  } else {
    ctx.fillStyle='#ddcc00'; ctx.fillRect(x+f(5),y+f(5),f(22),f(22));
    ctx.fillStyle='#111'; ctx.fillRect(x+f(16),y+f(14),f(13),f(8));
    ctx.fillStyle='#000'; ctx.fillRect(x+f(9),y+f(9),Math.max(2,f(5)),Math.max(2,f(5)));
  }
}

// ================================================================
// GHOST SPRITE DRAWING
// ================================================================
function drawGhostSprite(g,tx,tz){
  const baseH=Math.abs(Math.floor(H/tz));
  const sh=Math.floor(baseH*g.scale),sw=sh;
  const screenX=Math.floor((W/2)*(1+tx/tz));
  const left=screenX-(sw>>1),right=left+sw,top=HALF_H-(sh>>1);
  if(right<0||left>=W||sh<2) return;
  const frightened=STATE.frightenTimer>0;
  const blinking=frightened&&STATE.frightenTimer<3&&Math.floor(pulse*4)%2===0;
  const stunned=g.stunTimer>0;
  const bodyColor=stunned?'#888800':frightened?(blinking?'#ffffff':'#0055ff'):g.color;
  const eyeColor=frightened?'#ff3333':'#ffffff';
  const pupilColor=frightened?'#ffffff':'#000033';
  const eyeTop=top+Math.floor(sh*0.20),eyeBot=top+Math.floor(sh*0.42);
  const pupilTop=top+Math.floor(sh*0.28),pupilBot=top+Math.floor(sh*0.40);
  const bodyBot=top+Math.floor(sh*0.80),skirtBot=top+sh,bodyTop=top+Math.floor(sh*0.04);
  for(let sx=Math.max(0,left);sx<Math.min(W,right);sx++){
    if(tz>=zBuffer[sx]) continue;
    const relX=(sx-left)/sw;
    if(relX<0.08||relX>0.92) continue;
    ctx.fillStyle=bodyColor; ctx.fillRect(sx,bodyTop,1,bodyBot-bodyTop);
    const inGap=(relX>0.32&&relX<0.38)||(relX>0.62&&relX<0.68);
    if(!inGap) ctx.fillRect(sx,bodyBot,1,skirtBot-bodyBot);
    const inL=relX>=0.14&&relX<=0.38,inR=relX>=0.62&&relX<=0.86;
    if(inL||inR){
      ctx.fillStyle=eyeColor; ctx.fillRect(sx,eyeTop,1,eyeBot-eyeTop);
      if((relX>=0.20&&relX<=0.33)||(relX>=0.67&&relX<=0.80)){
        ctx.fillStyle=pupilColor; ctx.fillRect(sx,pupilTop,1,pupilBot-pupilTop);
      }
    }
  }
  if(g.isBoss&&g.hp<2){
    const by=top+sh+4;
    ctx.fillStyle='#ff4444'; ctx.fillRect(screenX-12,by,24,4);
    ctx.fillStyle='#ff8800'; ctx.fillRect(screenX-12,by,12,4);
  }
}

// ================================================================
// POWER-UP SPRITE DRAWING
// ================================================================
function drawPowerUpSprite(pu,tx,tz){
  const def=POWER_UP_DEFS[pu.type];
  const sh=Math.max(4,Math.floor(Math.abs(H/tz)*0.7)),sw=sh;
  const screenX=Math.floor((W/2)*(1+tx/tz));
  const bobY=Math.floor(Math.sin(pulse*2.5+pu.bobPhase)*Math.max(2,sh*0.1));
  const top=HALF_H-(sh>>1)+bobY,left=screenX-(sw>>1),right=left+sw;
  if(right<0||left>=W||sh<4) return;
  for(let sx=Math.max(0,left);sx<Math.min(W,right);sx++){
    if(tz>=zBuffer[sx]) continue;
    const relX=(sx-left)/sw;
    if(relX<0.1||relX>0.9){ctx.fillStyle=def.hi;ctx.fillRect(sx,top,1,sh);continue;}
    ctx.fillStyle=def.color; ctx.fillRect(sx,top,1,sh);
    if(relX>0.3&&relX<0.7){ctx.fillStyle=def.hi;ctx.fillRect(sx,top+Math.floor(sh*0.3),1,Math.floor(sh*0.4));}
  }
  if(tz<3.5&&sh>16){
    const fs=Math.max(7,Math.floor(12/tz));
    ctx.font=`${fs}px "Press Start 2P",monospace`;
    ctx.fillStyle='#fff'; ctx.textAlign='center';
    ctx.fillText(def.label,screenX,top-3);
  }
}

// ================================================================
// SPRITE RENDERER
// ================================================================
let pulse=0;

function renderSprites(){
  const all=[];
  for(let y=0;y<MAP_H;y++) for(let x=0;x<MAP_W;x++){
    const p=pelletGrid[y][x]; if(!p) continue;
    const{transformX:tx,transformZ:tz}=projectPoint(x+0.5,y+0.5);
    if(tz<0.1||tz>MAX_DEPTH) continue;
    all.push({kind:'p',subtype:p,tx,tz});
  }
  for(const pu of powerUps){
    if(pu.collected) continue;
    const{transformX:tx,transformZ:tz}=projectPoint(pu.x,pu.y);
    if(tz<0.1||tz>MAX_DEPTH) continue;
    all.push({kind:'pu',pu,tx,tz});
  }
  for(const g of ghosts){
    if(g.dead) continue;
    const{transformX:tx,transformZ:tz}=projectPoint(g.x,g.y);
    if(tz<0.1||tz>MAX_DEPTH) continue;
    all.push({kind:'g',g,tx,tz});
  }
  all.sort((a,b)=>b.tz-a.tz);
  for(const s of all){
    if(s.kind==='g'){drawGhostSprite(s.g,s.tx,s.tz);continue;}
    if(s.kind==='pu'){drawPowerUpSprite(s.pu,s.tx,s.tz);continue;}
    const sh=Math.abs(Math.floor(H/s.tz)),sw=sh;
    const sx0=Math.floor((W/2)*(1+s.tx/s.tz));
    const left=sx0-(sw>>1),right=left+sw;
    if(right<0||left>=W) continue;
    if(s.subtype===1){
      const dh=Math.max(2,Math.floor(sh*0.18)),dy=HALF_H-(dh>>1);
      ctx.fillStyle='#ffe632';
      for(let x=Math.max(0,left);x<Math.min(W,right);x++){
        if(s.tz>=zBuffer[x]) continue;
        const r=(x-left)/sw; if(r<0.41||r>0.59) continue;
        ctx.fillRect(x,dy,1,dh);
      }
    } else {
      const sc=0.22+Math.sin(pulse*4)*0.06;
      const dh=Math.max(4,Math.floor(sh*sc)),dy=HALF_H-(dh>>1);
      ctx.fillStyle=`rgba(0,255,200,${(0.75+Math.sin(pulse*4)*0.25).toFixed(2)})`;
      for(let x=Math.max(0,left);x<Math.min(W,right);x++){
        if(s.tz>=zBuffer[x]) continue;
        const r=(x-left)/sw; if(r<0.3||r>0.7) continue;
        ctx.fillRect(x,dy,1,dh);
      }
    }
  }
}

// ================================================================
// MINIMAP
// ================================================================
function drawMinimap(){
  const mmW=120,mmH=120,mmX=W-mmW-8,mmY=H-mmH-8;
  const cw=Math.max(3,Math.floor(mmW/MAP_W)),ch=Math.max(3,Math.floor(mmH/MAP_H));
  const aw=cw*MAP_W,ah=ch*MAP_H;
  const ox=mmX+Math.floor((mmW-aw)/2),oy=mmY+Math.floor((mmH-ah)/2);
  ctx.fillStyle='rgba(0,0,0,0.82)'; ctx.fillRect(mmX,mmY,mmW,mmH);
  ctx.strokeStyle='#555'; ctx.lineWidth=1; ctx.strokeRect(mmX,mmY,mmW,mmH);
  for(let y=0;y<MAP_H;y++) for(let x=0;x<MAP_W;x++){
    const px=ox+x*cw,py=oy+y*ch,cell=map[y][x];
    if(cell===1){ctx.fillStyle='#2a2a2a';ctx.fillRect(px,py,cw,ch);}
    else if(cell===2){
      const g=Math.floor(120+Math.sin(pulse*2)*40);
      ctx.fillStyle=`rgb(0,${g},40)`; ctx.fillRect(px,py,cw,ch);
    }
  }
  for(const pu of powerUps){
    if(pu.collected) continue;
    ctx.fillStyle=POWER_UP_DEFS[pu.type].hi;
    ctx.fillRect(ox+Math.floor(pu.x)*cw,oy+Math.floor(pu.y)*ch,Math.max(2,cw-1),Math.max(2,ch-1));
  }
  for(const g of ghosts){
    if(g.dead) continue;
    ctx.fillStyle=STATE.frightenTimer>0?'#4488ff':'#ff3333';
    ctx.fillRect(ox+Math.floor(g.x*cw)-1,oy+Math.floor(g.y*ch)-1,3,3);
  }
  const px=ox+player.x*cw,py2=oy+player.y*ch;
  ctx.save(); ctx.translate(px,py2); ctx.rotate(player.angle);
  ctx.fillStyle='#fff';
  ctx.beginPath(); ctx.moveTo(5,0); ctx.lineTo(-3,-3); ctx.lineTo(-1,0); ctx.lineTo(-3,3);
  ctx.closePath(); ctx.fill(); ctx.restore();
}

function renderScene(){
  const pal=WALL_PALETTES[STATE.level]||WALL_PALETTES[1];
  ctx.fillStyle='#0d0d1a'; ctx.fillRect(0,0,W,HALF_H);
  ctx.fillStyle='#1a0e06'; ctx.fillRect(0,HALF_H,W,HALF_H);
  for(let x=0;x<W;x++){
    const{dist:d,side}=castRay(player.angle-HALF_FOV+(x/W)*FOV);
    zBuffer[x]=d;
    const wh=Math.min(H,Math.floor(H/d));
    const fog=Math.min(1,d/MAX_DEPTH);
    const sh=(side===1?0.55:1.0)*(1-fog*0.75);
    const[pr,pg,pb]=pal.bright;
    ctx.fillStyle=`rgb(${Math.floor(pr*sh)},${Math.floor(pg*sh)},${Math.floor(pb*sh)})`;
    ctx.fillRect(x,HALF_H-(wh>>1),1,wh);
  }
  renderSprites();

  if(STATE.deathFlashTimer>0){
    ctx.fillStyle=`rgba(220,0,0,${(STATE.deathFlashTimer/0.4).toFixed(2)})`;
    ctx.fillRect(0,0,W,H);
  }
  if(STATE.shieldActive&&Math.floor(pulse*4)%6===0){
    ctx.fillStyle='rgba(0,80,220,0.12)'; ctx.fillRect(0,0,W,H);
  }
  renderHUD();

  // CRT scanline effect — subtle horizontal lines
  ctx.fillStyle='rgba(0,0,0,0.08)';
  for(let y=0;y<H;y+=3) ctx.fillRect(0,y,W,1);
}

// ================================================================
// WALKABILITY
// ================================================================
function isWalkable(mx,my){
  if(mx<0||mx>=MAP_W||my<0||my>=MAP_H) return false; return map[my][mx]!==1;
}
function isGhostWalkable(mx,my){
  if(mx<0||mx>=MAP_W||my<0||my>=MAP_H) return false; return map[my][mx]===0;
}

// ================================================================
// GHOST AI — cell-to-cell movement, no U-turns
// ================================================================
function pickNextCell(g){
  const cx=Math.floor(g.x),cy=Math.floor(g.y);
  const DIRS=[[-1,0],[1,0],[0,-1],[0,1]];
  const ap=DIRS.filter(([dx,dy])=>{
    const nx=cx+dx,ny=cy+dy;
    return isGhostWalkable(nx,ny)&&!(nx===g.prevCX&&ny===g.prevCY);
  });
  const opt=ap.length>0?ap:DIRS.filter(([dx,dy])=>isGhostWalkable(cx+dx,cy+dy));
  if(!opt.length) return;
  let chosen;
  const fr=STATE.frightenTimer>0;
  if(fr){
    chosen=opt.reduce((b,d)=>{
      const db=dist2(cx+b[0]+0.5,cy+b[1]+0.5,player.x,player.y);
      const dd=dist2(cx+d[0]+0.5,cy+d[1]+0.5,player.x,player.y);
      return dd>db?d:b;
    });
  } else if((g.ai==='chase'||g.isBoss)&&Math.random()<0.75){
    chosen=opt.reduce((b,d)=>{
      const db=dist2(cx+b[0]+0.5,cy+b[1]+0.5,player.x,player.y);
      const dd=dist2(cx+d[0]+0.5,cy+d[1]+0.5,player.x,player.y);
      return dd<db?d:b;
    });
  } else {
    chosen=opt[Math.floor(Math.random()*opt.length)];
  }
  g.prevCX=cx; g.prevCY=cy;
  g.targetCX=cx+chosen[0]; g.targetCY=cy+chosen[1];
}

function updateGhosts(dt){
  if(STATE.frightenTimer>0) STATE.frightenTimer-=dt;
  for(const g of ghosts){
    if(g.dead){g.deadTimer-=dt;if(g.deadTimer<=0)respawnGhost(g);continue;}
    if(g.hitTimer>0) g.hitTimer-=dt;
    if(g.stunTimer>0){g.stunTimer-=dt;continue;}
    const speed=STATE.frightenTimer>0?g.speed*0.5:g.speed;
    const tx=g.targetCX+0.5,ty=g.targetCY+0.5;
    const dx=tx-g.x,dy=ty-g.y,d=Math.sqrt(dx*dx+dy*dy);
    if(d<speed*dt+0.06){g.x=tx;g.y=ty;pickNextCell(g);}
    else{g.x+=(dx/d)*speed*dt;g.y+=(dy/d)*speed*dt;}
    if(STATE.playerInvincTimer>0) continue;
    if(dist(g.x,g.y,player.x,player.y)<0.55&&STATE.frightenTimer<=0) playerHit();
  }
}

function respawnGhost(g){
  g.x=g.spawnX;g.y=g.spawnY;g.targetCX=Math.floor(g.spawnX);g.targetCY=Math.floor(g.spawnY);
  g.prevCX=g.targetCX;g.prevCY=g.targetCY;g.hp=g.isBoss?2:1;g.color=g.baseColor;
  g.dead=false;g.hitTimer=0;g.stunTimer=0;
}

function playerHit(){
  if(STATE.shieldActive){
    STATE.shieldActive=false;STATE.activePowerUp=null;STATE.activePowerUpTimer=0;
    STATE.deathFlashTimer=0.2;playSound('shieldHit');return;
  }
  STATE.lives--;STATE.playerInvincTimer=2.0;STATE.deathFlashTimer=0.4;
  playSound('death');
  if(STATE.lives<=0){updateHighScore();STATE.phase='GAME_OVER';}
}

// ================================================================
// POWER-UP COLLECTION + EFFECTS
// ================================================================
function collectPowerUp(pu){
  pu.collected=true;
  playSound('powerup');
  const mult=DIFF_PARAMS[STATE.ageGroup].powerUpMult; // age-group multiplier on timed power-ups
  switch(pu.type){
    case 'FIRE_BREATH':
      STATE.activePowerUp='FIRE_BREATH';STATE.activePowerUpTimer=5*mult;break;
    case 'TAIL_WHIP':
      for(const g of ghosts)if(!g.dead&&dist(g.x,g.y,player.x,player.y)<2)g.stunTimer=2;
      STATE.activePowerUp='TAIL_WHIP';STATE.activePowerUpTimer=2;break;
    case 'FOSSIL_SHIELD':
      STATE.shieldActive=true;STATE.activePowerUp='FOSSIL_SHIELD';STATE.activePowerUpTimer=999;break;
    case 'SPEED_BOOST':
      STATE.activePowerUp='SPEED_BOOST';STATE.activePowerUpTimer=8*mult;break;
    case 'ANCIENT_RAGE':
      STATE.frightenTimer=DIFF_PARAMS[STATE.ageGroup].frightenDuration;playSound('frighten');
      STATE.activePowerUp='ANCIENT_RAGE';STATE.activePowerUpTimer=STATE.frightenTimer;break;
  }
}

// ================================================================
// PLAYER ATTACK
// ================================================================
function handleAttack(){
  if(STATE.activePowerUp==='FIRE_BREATH'){
    let closest=null,cd=5;
    for(const g of ghosts){if(g.dead)continue;const d=dist(g.x,g.y,player.x,player.y);if(d<cd){cd=d;closest=g;}}
    if(!closest)return;
    const gd=GHOST_TYPES[closest.type];
    STATE.score+=closest.isBoss?500:100;
    STATE.killMessage=closest.isBoss?'BOSS SCORCHED!':`${(gd?gd.killMsg:'GHOST INCINERATED!').replace('!','')} (FIRE)!`;
    STATE.killMessageTimer=2;closest.dead=true;closest.deadTimer=5;
    playSound('ghostDefeat');return;
  }
  if(STATE.frightenTimer<=0)return;
  const range=char.hitsToKill===1?1.5:1.2;
  let closest=null,cd=range;
  for(const g of ghosts){if(g.dead)continue;const d=dist(g.x,g.y,player.x,player.y);if(d<cd){cd=d;closest=g;}}
  if(!closest)return;
  closest.hp--;
  if(closest.hp<=0){
    const gd=GHOST_TYPES[closest.type];
    STATE.score+=closest.isBoss?1000:200;
    STATE.killMessage=closest.isBoss?'DRAGON SPECTER VANQUISHED!':gd?gd.killMsg:'GHOST SLAIN!';
    STATE.killMessageTimer=2;closest.dead=true;closest.deadTimer=5;
    playSound('ghostDefeat');
  } else {
    closest.color='#ff00cc';
    STATE.score+=50;STATE.killMessage='BOSS STAGGERED!';STATE.killMessageTimer=1.5;closest.hitTimer=0.3;
    playSound('titleBeep'); // short hit sound
  }
}

// ================================================================
// PLAYER UPDATE
// ================================================================
function updatePlayer(dt){
  const{moveSpeed,rotSpeed}=char;
  const spd=STATE.activePowerUp==='SPEED_BOOST'?1.5:1.0;
  if(keys['ArrowLeft']||keys['KeyA'])player.angle-=rotSpeed;
  if(keys['ArrowRight']||keys['KeyD'])player.angle+=rotSpeed;
  let dx=0,dy=0;
  if(keys['ArrowUp']||keys['KeyW']){dx=Math.cos(player.angle)*moveSpeed*spd;dy=Math.sin(player.angle)*moveSpeed*spd;}
  if(keys['ArrowDown']||keys['KeyS']){dx=-Math.cos(player.angle)*moveSpeed*spd;dy=-Math.sin(player.angle)*moveSpeed*spd;}
  const M=0.25;
  if(dx!==0){const nx=player.x+dx;if(isWalkable(Math.floor(nx+Math.sign(dx)*M),Math.floor(player.y)))player.x=nx;}
  if(dy!==0){const ny=player.y+dy;if(isWalkable(Math.floor(player.x),Math.floor(ny+Math.sign(dy)*M)))player.y=ny;}

  // Footstep
  const moving=!!(keys['ArrowUp']||keys['KeyW']||keys['ArrowDown']||keys['KeyS']);
  if(moving){footstepTimer-=dt;if(footstepTimer<=0){playSound('footstep');footstepTimer=0.18;}}
  else footstepTimer=0;

  // Pellet collection
  const cx=Math.floor(player.x),cy=Math.floor(player.y);
  if(pelletGrid[cy]&&pelletGrid[cy][cx]>0){
    const pt=pelletGrid[cy][cx];pelletGrid[cy][cx]=0;pelletsLeft--;
    if(pt===1){STATE.score+=10;playSound('pellet');}
    else{STATE.score+=50;STATE.frightenTimer=DIFF_PARAMS[STATE.ageGroup].frightenDuration;playSound('pelletPwr');playSound('frighten');}
  }

  // Power-up collection
  for(const pu of powerUps){if(!pu.collected&&dist(pu.x,pu.y,player.x,player.y)<0.55)collectPowerUp(pu);}

  // Space attack
  const sn=!!keys['Space'];
  if(sn&&!prevSpaceDown)handleAttack();
  prevSpaceDown=sn;

  // Timers
  if(STATE.playerInvincTimer>0)STATE.playerInvincTimer-=dt;
  if(STATE.killMessageTimer>0) STATE.killMessageTimer-=dt;
  if(STATE.deathFlashTimer>0)  STATE.deathFlashTimer-=dt;
  if(STATE.activePowerUp&&STATE.activePowerUp!=='FOSSIL_SHIELD'){
    STATE.activePowerUpTimer-=dt;
    if(STATE.activePowerUpTimer<=0){STATE.activePowerUp=null;STATE.activePowerUpTimer=0;}
  }
  if(STATE.activePowerUp==='ANCIENT_RAGE')STATE.activePowerUpTimer=STATE.frightenTimer;

  if(pelletsLeft<=0){updateHighScore();playSound('levelDone');STATE.phase='LEVEL_COMPLETE';}
}

// ================================================================
// GAME LOOP
// ================================================================
let lastTime=0;

function loop(ts){
  const dt=Math.min((ts-lastTime)/1000,0.05);
  lastTime=ts;
  pulse+=dt; // global animation timer — drives all pulsing effects

  switch(STATE.phase){
    case 'AGE_SELECT':    updateAgeSelect();      renderAgeSelect();    break;
    case 'TITLE':         updateTitle(dt);        renderTitle();        break;
    case 'PLAYING':       updatePlayer(dt);       updateGhosts(dt);     renderScene(); break;
    case 'LEVEL_COMPLETE':updateLevelComplete();  renderLevelComplete(); break;
    case 'WIN':           renderWin();             break;
    case 'GAME_OVER':     updateGameOver();        renderGameOver();     break;
  }

  // Clear enter flag after each frame (only acts on the frame it first appears)
  // AGE_SELECT, TITLE, LEVEL_COMPLETE, WIN, GAME_OVER manage enterPressed themselves
  if(STATE.phase!=='AGE_SELECT'&&STATE.phase!=='TITLE'&&STATE.phase!=='LEVEL_COMPLETE'&&STATE.phase!=='WIN'&&STATE.phase!=='GAME_OVER')
    enterPressed=false;

  requestAnimationFrame(loop);
}

// ================================================================
// BOOT — start at title screen
// ================================================================
requestAnimationFrame(loop);
</script>
